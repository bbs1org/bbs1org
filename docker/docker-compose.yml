name: bbs1org

x-php: &php
  image: serversideup/php:8.5-fpm
  working_dir: /var/www/html
  environment:
    PHP_OPCACHE_ENABLE: "1"
  volumes:
    - ..:/var/www/html:rw
    - data:/var/www/html/app/data
    - avatars:/var/www/html/app/avatars
    - upload:/var/www/html/app/upload
    - plugins:/var/www/html/app/plugins
    - ./opcache.ini:/usr/local/etc/php/conf.d/zzz-opcache.ini:ro

services:
  php-init:
    <<: *php
    user: "0:0"
    command: sh -c 'chown -R www-data:www-data app && chown root:www-data . && chmod 775 .'

  php:
    <<: *php
    restart: unless-stopped
    depends_on:
      php-init:
        condition: service_completed_successfully

  mysql:
    image: mysql:8.4
    profiles: ["mysql"]
    restart: unless-stopped
    command: --ngram-token-size=2
    environment:
      MYSQL_DATABASE: ${DB_NAME:-forum}
      MYSQL_USER: ${DB_USER:-forum}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-this-password}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-change-this-password}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql:/var/lib/mysql

  postgres:
    image: postgres:18
    profiles: ["pgsql"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-forum}
      POSTGRES_USER: ${DB_USER:-forum}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres:/var/lib/postgresql

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ..:/var/www/html:ro
      - avatars:/var/www/html/app/avatars:ro
      - upload:/var/www/html/app/upload:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  data:
  avatars:
  upload:
  plugins:
  mysql:
  postgres:
